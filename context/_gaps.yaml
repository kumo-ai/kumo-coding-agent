# ─── Platform Gaps ────────────────────────────────────────────────────
# Features that do NOT exist in the SDK — agent should refuse or workaround

platform_gaps:

  - id: plat-001
    feature: "fine-tuned SDK explainability"
    description: >
      No feature importance or explanation API on trained model results.
      RFM has explain=True; fine-tuned SDK does not.
    workaround: >
      Use RFM explain on the same query for feature importance.
      Or analyze holdout_df manually (compare predictions vs actuals,
      slice by feature values to find drivers).
    affects:
      - skills/iterate-model.md
      - skills/train-model.md
    priority: high
    added: "2026-03-30"
    status: open

  - id: plat-002
    feature: "Per-example explanations (Enterprise)"
    description: >
      Cannot get per-entity feature attributions from a trained model.
      Only aggregate metrics are available.
    workaround: >
      For individual entity explanations, run RFM predict with
      explain=True on specific entities of interest.
    affects:
      - skills/iterate-model.md
    priority: medium
    added: "2026-03-30"
    status: open

  - id: plat-003
    feature: "External tracking integration (MLflow, W&B)"
    description: >
      No built-in integration with external experiment tracking systems.
      Users must manually log metrics and parameters.
    workaround: >
      Use result.metrics() and result.model_plan to extract values,
      then log to external tracker manually in user code.
    affects:
      - skills/iterate-model.md
    priority: low
    added: "2026-03-30"
    status: open
