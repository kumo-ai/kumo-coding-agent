# Gap manifest: tracks known documentation gaps and platform limitations.
# Checked during sync-from-source and verify-content workflows.
#
# Types:
#   documentation — SDK feature exists but agent doesn't document it
#   platform      — feature doesn't exist in SDK; agent should refuse/workaround
#
# Fields:
#   id:          unique identifier (doc-NNN or plat-NNN)
#   feature:     short name of the feature
#   description: what it does / why it matters
#   check:       grep pattern to verify existence (documentation gaps only)
#   check_path:  file to grep in (relative to kumoai package root)
#   affects:     agent files that need updating when resolved
#   priority:    critical | high | medium | low
#   workaround:  suggested alternative (platform gaps only)
#   added:       date the gap was recorded
#   status:      open | resolved
#   resolved:    date resolved (when status = resolved)

# ─── Documentation Gaps ───────────────────────────────────────────────
# SDK features that exist but the agent doesn't cover (or covers incorrectly)

documentation_gaps:

  - id: doc-001
    feature: "training_job.progress()"
    description: >
      Returns AutoTrainerProgress with per-trial, per-epoch train/validation
      metrics. This is the training curves data — essential for diagnosing
      overfitting vs underfitting.
    check: "def progress"
    check_path: "kumoai/trainer/job.py"
    affects:
      - context/platform/sdk-overview.md
      - skills/train-model.md
      - skills/iterate-model.md
    priority: critical
    added: "2026-03-30"
    status: resolved
    resolved: "2026-03-31"

  - id: doc-002
